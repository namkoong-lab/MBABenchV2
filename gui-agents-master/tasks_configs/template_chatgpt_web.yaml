# ChatGPT Web Agent — Template Configuration
# ===========================================
# This file defines AGENT settings shared across all tasks.
# Task-specific settings (files, output naming) go in your tasks YAML.
#
# See tasks_configs/examples/sample_tasks.yaml for task list format.

template:
  agent_type: "chatgpt_web"

  # Base directory for resolving relative paths in upload_files.
  # If omitted, paths are resolved from the current working directory.
  # local_files_base: "project_data/"

  # Single prompt with all instructions sent with attachments
  prompts:
    - "I will be giving you a task in three steps. Your only allowed method for solving this problem is by building an Excel Model using the currently opened sheet, its provided data if any, and any files I attached. You must not use any external or internal tools, like a code interpreter or calculator, to find the final answers. The Excel file you build must be the only thing performing the calculations.\n\nYour first task is to analyze the attached problem statement and data file(s) and output them in a new sheet called 'Summary'. Do not build the model yet. Provide a brief summary of 1. The primary questions to answer. 2. The key inputs and assumptions. 3. A high-level plan for solving it. Confirm when you have completed this analysis.\n\nYour next step is actually making the model. Create a new Excel sheet called 'model_main'. All logic should be on this 'model_main' tab. If you need additional sheets, you can create them in the name of 'model_{number}' where the number is an incrementing number (e.g. 'model_1', 'model_2', etc.). Adhere to these standards: professional formatting, robust (inputs in separate cells, no hard-coding in formulas), accurate, and tractable. For example, this model should be up to the standards and presentation abilities of a white-collar worker in a top professional services firm. Let me know when the model is complete.\n\nYour final task is to create the answers sheet. Create a new tab named 'answers_final'. On this sheet, present the final answers to all questions. Every single answer on this sheet must be directly referenceable to your 'model_main' sheet (or other 'model_' sheets). Hard coded values are to be generally avoided on the answers sheet. If you need additional answer sheets, name them 'answers_1', 'answers_2', etc."

  # Enable artifact download
  download_artifacts: true
  artifact_download_dir: "./artifacts"

  # Enable S3 and database upload
  upload_to_cloud: false
  db_enabled: false

  # ChatGPT Web Agent specific settings
  chatgpt_web:
    # Project for consistent instructions across all tasks
    project_id: "your-project-id-here"
    project_slug: "your-project-slug"

    # Enable agent mode (uses Code Interpreter for Excel)
    agent_mode: true

    # Model selection (optional). If null or omitted, uses the current
    # model in your ChatGPT session.
    # Options: instant, thinking, pro
    model: null

    max_sec_per_task: 5400  # 90 min timeout

    browser:
      type: "chrome_canary"
      headless: false
      timeout: 30000

    check_interval_seconds: 3
    max_wait_per_prompt_seconds: 5400  # 90 min — single prompt does all 3 steps

    retry:
      max_agent_attempts: 3
      max_total_attempts: 10
      max_sec_per_attempt: 5400
      sleep_between_retries: 5

    output:
      folder_prefix: "chatgptGUI"

    session:
      agent_name: "chatgpt_web"

    logging:
      level: "INFO"
      save_to_file: true
      log_directory: "chatgpt_web_logs"

    runtime:
      no_hold: true
