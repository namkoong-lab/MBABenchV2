# Sample Task List Configuration
# ================================
#
# Each task entry tells the automation:
#   1. WHAT local files to upload into the AI chat
#   2. WHAT to name the output solution file
#
# The TEMPLATE config (e.g. template_claude_web.yaml) controls:
#   - Which AI agent to use (Claude or ChatGPT)
#   - What prompts to send
#   - Retry / timeout settings
#
# ──────────────────────────────────────────────────────────────
#  Files are uploaded directly into the AI chat
#  (Claude.ai / ChatGPT.com). All file paths are LOCAL
#  (on your machine). No OneDrive navigation is needed.
# ──────────────────────────────────────────────────────────────

task_source: "my_tasks"

tasks:
  # ── Example 1: General-purpose task ─────────────────────────
  # Works for ANY project — not just finance.
  - task_name: "Dolphin_Migration_Analysis"

    # LOCAL — Files on your machine to upload into the AI chat.
    # Paths are relative to local_files_base (in template config)
    # or to the current working directory if local_files_base is not set.
    upload_files:
      - "data/dolphin_sightings_2025.pdf"
      - "data/gps_tracks.csv"

    # OUTPUT — Base name for the solution file.
    # Final name: {YYYYMMDD}_{HHMMSS}_{solution_name}_{agent}.xlsx
    # Omit to use default: {task_name}_Solution_{agent}_Model.
    solution_name: "Dolphin_Migration_Q1"

  # ── Example 2: Minimal config (no custom solution name) ─────
  - task_name: "Sales_Forecast"
    upload_files:
      - "tasks/Sales_Forecast/quarterly_data.xlsx"
      - "tasks/Sales_Forecast/brief.pdf"
    # skip: true  # Uncomment to skip this task

  # ── Example 3: Absolute paths ───────────────────────────────
  # Absolute paths are fine too. Replace with a real file on your machine.
  - task_name: "Quick_Test"
    upload_files:
      - "/absolute/path/to/test_brief.pdf"
    solution_name: "Quick_Test_Solution"

  # ── Example 4: Alternative field name ───────────────────────
  # `files_to_upload` is accepted as an alias for `upload_files`.
  - task_name: "Alias_Example"
    files_to_upload:
      - "tasks/Alias_Example/task_description.pdf"
      - "tasks/Alias_Example/starting_data.xlsx"
