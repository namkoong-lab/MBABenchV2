# ChatGPT E2E Test — Template Configuration
# ==========================================
# Local only, no cloud upload, 1 attempt.
# For quick validation of the ChatGPT web agent pipeline.

template:
  agent_type: "chatgpt_web"

  # Base directory for resolving relative paths in upload_files.
  # local_files_base: "project_data/"

  # Prompts — replace with your own instructions. These are generic placeholders.
  prompts:
    - "Analyze the attached files. Summarize the key data and questions to answer."
    - "Build an Excel solution on a new sheet. Use formulas (no hardcoded values) and organize the workbook clearly."
    - "Create a summary sheet with your final answers and conclusions. Then download the workbook."

  # Where the downloaded .xlsx artifact is saved (relative to CWD).
  download_artifacts: true
  artifact_download_dir: "./artifacts"

  chatgpt_web:
    # REQUIRED: paste from your ChatGPT project URL (see README §5).
    # Example: https://chatgpt.com/g/g-p-{project_id}-{slug}/project
    project_id: "your-project-id-here"
    project_slug: "your-project-slug"

    agent_mode: true

    max_sec_per_task: 1800  # 30 min (shorter for test)

    browser:
      type: "chrome_canary"
      headless: false
      timeout: 30000

    check_interval_seconds: 3
    max_wait_per_prompt_seconds: 1800  # 30 min (agent mode tasks can be long)

    retry:
      max_agent_attempts: 1    # Single attempt for test
      max_total_attempts: 3
      max_sec_per_attempt: 1800  # Must match max_wait_per_prompt_seconds
      sleep_between_retries: 5

    output:
      folder_prefix: "chatgptGUI_test"

    session:
      agent_name: "chatgpt_web"

    logging:
      level: "INFO"
      save_to_file: true
      log_directory: "chatgpt_web_logs"
