# Sample run-config (overlay-shaped) that pulls tasks from the MBABenchV2
# Postgres DB and runs them through the ChatGPT agent.
#
# Run it with:
#   python -m infra.run --run-config infra/configs/run_configs/mbabenchv2_run_examples/sample_mbabenchv2.yaml
#
# This file is *overlay-shaped* (no top-level task fields like task_name or
# upload_files) — it is deep-merged onto configs.yaml as a 3rd config layer.
# Put long-lived machine/project settings (database.url, AWS credentials,
# chatgpt_web.project_id / project_slug) in configs.yaml; put "what to run
# this time" here.
#
# Prereqs in configs.yaml:
#   database:
#     url: "postgresql://.../MBABenchV2?sslmode=require&channel_binding=require"
#   chatgpt_web:
#     project_id: "..."
#     project_slug: "..."

source:
  kind: postgres_s3
  schema: mbabenchv2        # picks MBABenchV2PostgresS3TaskSource
  filters:
    # Pick one (or both): filter by explicit task_ids, or by task_source.
    task_ids: [1]
    # task_sources: ["modeloff"]
    skip_deprecated: true
    # Skip tasks that already have a non-failed attempt at this
    # prompt_version from the agent identity resolved from the provider
    # block below (see infra/configs/agent_identity.py).
    skip_already_attempted: true

provider:
  kind: "chatgpt"

# agent_model_name / agent_folder are derived from chatgpt_web (model,
# agent_mode) via infra/configs/agent_identity.py — no yaml field.

chatgpt_web:
  agent_mode: false # control whether to use agentic mode
  model: "pro"
  # model: "thinking"

# ChatGPT agent mode works best with ONE combined prompt rather than a
# sequence. Override the default Claude-style multi-prompt list.
prompts:
  - "Analyze the attached files. Summarize the key data, build an Excel solution with formulas (no hardcoded values), and create a summary sheet with your final answers. Download the workbook when done."
