# Sample run-config (overlay-shaped) that pulls tasks from the MBABenchV2
# Postgres DB AND writes attempts back to S3 + task_attempts.
#
# Run it with:
#   python -m infra.run --run-config infra/configs/run_configs/mbabenchv2_run_examples/sample_mbabenchv2_write.yaml
#
# Same shape as sample_mbabenchv2.yaml (the read-only variant) — the only
# difference is `sink.kind: postgres_s3`, which uploads the solution +
# completion log to S3 and inserts one row into task_attempts per run.
#
# Prereqs in configs.yaml:
#   database:
#     url: "postgresql://.../MBABenchV2?sslmode=require&channel_binding=require"
#   claude_web:           # or chatgpt_web, per provider.kind below
#     # project_id: "..." # optional, pins to a Claude project
#
# AWS credentials: set aws.access_key_id(_env) / secret_access_key(_env)
# in configs.yaml. The boto3 default credential chain (~/.aws/credentials,
# IAM role) is intentionally NOT consulted.
#
# Idempotency: source.filters.skip_already_attempted skips tasks that
# already have a non-failed attempt at this (agent_model_name,
# prompt_version), where agent_model_name is derived from the provider
# block via infra/configs/agent_identity.py. Failed/timeout runs still
# get a row with agent_failed=true.

source:
  kind: postgres_s3
  schema: mbabenchv2       # picks MBABenchV2PostgresS3TaskSource
  filters:
    task_ids: [1]
    # task_sources: ["modeloff"]
    skip_deprecated: false
    skip_already_attempted: false

sink:
  kind: postgres_s3
  schema: mbabenchv2       # picks MBABenchV2PostgresS3AttemptSink
  # S3 bucket + prefix come from aws.* in configs.default.yaml.
  # agent_folder / agent_model_name / agent_model_type are derived from
  # the provider block (see infra/configs/agent_identity.py).
  # prompt_version comes from agent.prompt_version.

chatgpt_web:
  agent_mode: false  # control whether to use agentic mode
  model: "instant"
  # model: "pro"

provider:
  kind: "chatgpt"

# agent.prompt_version inherits from configs.default.yaml (8).
# agent_model_name / agent_folder / agent_model_type are computed from the
# chatgpt_web block — no yaml field for them.

prompts:
  - "Analyze the attached files. Summarize the key data, build an Excel solution with formulas (no hardcoded values), and create a summary sheet with your final answers. Download the workbook when done."
