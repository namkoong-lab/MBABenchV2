# Sample run-config (overlay-shaped) that pulls tasks from the Bizbench
# Postgres DB AND writes attempts back to S3 + task_attempts.
#
# Run it with:
#   python -m infra.run --run-config infra/configs/run_configs/bizbench_run_examples/sample_bizbench_write.yaml
#
# Same shape as sample_bizbench.yaml (the read-only variant) — the only
# difference is `sink.kind: postgres_s3`, which uploads the solution +
# completion log to S3 and inserts one row into task_attempts per run.
#
# Prereqs in configs.yaml:
#   database:
#     url: "postgresql://.../BizbenchV1?sslmode=require&channel_binding=require"
#   claude_web:           # or chatgpt_web, per provider.kind below
#     # project_id: "..." # optional, pins to a Claude project
#
# AWS credentials: set aws.access_key_id(_env) / secret_access_key(_env)
# in configs.yaml. The boto3 default credential chain (~/.aws/credentials,
# IAM role) is intentionally NOT consulted.
#
# Idempotency: source.filters.skip_already_attempted skips tasks that
# already have a non-failed attempt from (agent.model_name,
# agent.prompt_version). Failed/timeout runs still get a row with
# agent_failed=true.

source:
  kind: postgres_s3
  schema: bizbench       # picks BizbenchPostgresS3TaskSource
  filters:
    task_ids: [1]
    # task_sources: ["modeloff"]
    skip_deprecated: false
    skip_already_attempted: false

sink:
  kind: postgres_s3
  schema: bizbench       # picks BizbenchPostgresS3AttemptSink
  # S3 bucket + prefix, agent_folder, agent_model_name, agent_model_type
  # (always "gui"), and prompt_version are all pulled from the shared
  # aws.* / agent.* blocks in configs.default.yaml + configs.yaml.

chatgpt_web:
  agent_mode: false  # control whether to use agentic mode
  model: "instant"
  # model: "pro"

provider:
  kind: "chatgpt"

agent:
  model_name: "chatgpt_web"
  agent_folder: "chatgpt_web"
  # prompt_version: 8   # inherits from configs.default.yaml

prompts:
  - "Analyze the attached files. Summarize the key data, build an Excel solution with formulas (no hardcoded values), and create a summary sheet with your final answers. Download the workbook when done."
