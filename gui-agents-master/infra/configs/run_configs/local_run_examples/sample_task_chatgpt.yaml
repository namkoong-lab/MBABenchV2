# Sample run-config (task-shaped) that routes to ChatGPT instead of Claude.
# Run it with:
#   python -m infra.run --run-config infra/configs/run_configs/local_run_examples/sample_task_chatgpt.yaml
#
# Because the top level contains task fields (task_name, upload_files, ...),
# --run-config treats this as a YAML task file: it forces source.kind='yaml'
# and hands the file to YamlTaskSource. Non-reserved keys below are
# deep-merged onto the global cfg for this task only — including
# `provider.kind`, so other runs stay on whatever default is in configs.yaml.

task_name: "Sample_Task_ChatGPT"
task_source: "my_tasks"

upload_files:
  - "data/sample/MO15 Round 1 - Sec 2 - Bread and Butter - Workbook.xlsx"
  - "data/sample/MO15 Round 1 - Sec 2 - Bread and Butter.pdf"

solution_name: "Sample_Task_ChatGPT: Bread and Butter Analysis"

# ── below: per-task overrides (not forwarded as reserved fields) ──
provider:
  kind: "chatgpt"

# agent_model_name / agent_folder are derived from the chatgpt_web block
# (plus provider.kind) via infra/configs/agent_identity.py — no yaml field.

# ChatGPT agent mode works best with ONE combined prompt rather than a
# sequence. Replace the global Claude-style list for this task only.
prompts:
  - "Analyze the attached files. Summarize the key data, build an Excel solution with formulas (no hardcoded values), and create a summary sheet with your final answers. Download the workbook when done."

# chatgpt_web.project_id / project_slug are inherited from configs.yaml.
# Add a chatgpt_web: block here only if this task needs different values.
