# Spin-up config template: ChatGPT provider, agent mode.
#
# Pass to spinup.sh via:
#   ./infra/dispatcher/spinup.sh \
#       --alias chatgpt-agent-1 \
#       --config-template infra/dispatcher/config_templates/chatgpt_agent.yaml
#
# Deep-merges on top of infra/configs/configs.default.yaml; every key here
# is an override. DB URL and AWS creds intentionally absent — spinup.sh
# synthesizes /etc/gui-agents/secrets.env from the operator's env, and the
# worker reads those via the EnvironmentFile in gui-agents-worker.service.

provider:
  kind: "chatgpt"

agent:
  prompt_version:
    value: 9

# With agent_mode=true, ChatGPT Agent is its own routed backend — the
# `model` value below is cosmetic and does NOT affect identity resolution.
# See infra/configs/agent_identity.py: this collapses to "chatgpt_agent"
# regardless of chatgpt_web.model.

chatgpt_web:
  model: "pro"
  agent_mode: true
  # Paste from https://chatgpt.com/g/g-p-{project_id}-{slug}/project.
  # Required — preflight exits if either is null/empty under provider=chatgpt.
  project_id: "6958bb36c8e88191a6df89918a683e0d"
  project_slug: "agentic-excel-tests"
  browser:
    # Matches the path the README's VNC-login step writes cookies into.
    profile_dir: "/var/lib/gui-agents/chrome-chatgpt"

# Production boxes pull from the Bizbench Postgres DB and write attempts to S3.
source:
  kind: "postgres_s3"
  schema: "bizbench"
  filters:
    skip_deprecated: true
    skip_already_attempted: true

sink:
  kind: "postgres_s3"
  schema: "bizbench"

# ChatGPT agent mode works best with one combined prompt rather than the
# multi-step Claude-style sequence in configs.default.yaml.
prompts:
  - |
    You are an expert financial modeling agent. Your task is to create accurate spreadsheet solutions for the provided case against the following rubric for which you will be evaluated against. Note each criterion and ensure the final Excel workbook you provide must satisfy all of the criteria below, and meet the "good" and avoids the "bad" standard described.
    ================================================================================
    ACCURACY
    ================================================================================

    Final calculations
    Check whether the final calculations of the sheet are accurate with the given inputs and case context.
      Good: Calculations are accurate and match the given inputs and case context.
      Bad:  Calculations are incorrect or missing.

    --------------------------------------------------------------------------------

    Starting values
    Check whether the workbook uses the correct input values given in the case context.
      Good: Workbook uses the correct input values given in the case context.
      Bad:  Workbook uses incorrect input values given in the case context.

    --------------------------------------------------------------------------------

    Task completed
    Check whether the workbook completes the task given in the case context.
      Good: Workbook completes the task given in the case context.
      Bad:  Workbook does not complete the task given in the case context.

    --------------------------------------------------------------------------------

    Number sign consistency
    Check whether negative calculations are consistent. (e.g. if CapEX is represented as negative in one place it should be everywhere, and if cost/spending is represented as positive in one place, then it should be added up if calculating for cost, or subtracted if calculating for revenue). IMPORTANT: If no calculations exist because the work was not completed, this check FAILS.
      Good: Negative calculations are consistent across all sheets.
      Bad:  Negative calculations are inconsistent, OR no calculations exist because the model was not completed.


    ================================================================================
    FORMULA
    ================================================================================

    Logic readability & size
    Check whether formulas are clear and understandable, using helper columns to break complex calculations into logical steps. Avoid monolithic 'mega-formulas' that obscure logic and make debugging difficult. There should not be duplicated/repeated/unnecessary calculations.
      Good: Complex calculations split into multiple helper columns showing intermediate steps. Formula intent is immediately clear. Easy to audit and debug.
      Bad:  Monolithic nested formulas with multiple functions that obscure logic. No helper columns when clearly needed. Difficult to understand intent or debug errors.

    --------------------------------------------------------------------------------

    Handle edge cases
    Proper error traps (IFERROR or equivalent) are required where using lookups/divisions, especially when from the assumption table, can fail. For financial statements (e.g. Balance Sheet, Income Statement, Cash Flow Statement, and Statement of Shareholders' Equity), IFERROR need not apply. Error traps should return a clear error message to the user. Workbook should include error handling and checks (e.g., balance sheet should balance, circularity should be flagged) to ensure the model does not break silently.
      Good: Error traps (IFERROR or equivalent) properly implemented where lookups/divisions can fail. Dedicated error checks clearly formatted for quick identification.
      Bad:  Missing error traps where lookups/divisions can fail. No checks or error indicators; model may break silently.

    --------------------------------------------------------------------------------

    Avoid hardcoding
    Inputs and constants must reference input cells; no external/off-Excel calculations; no buried constants in formulas.
      Good: All inputs and constants reference input cells; no external calculations; no buried constants.
      Bad:  Hard-coded values in formulas; external/off-Excel calculations; buried constants.

    --------------------------------------------------------------------------------

    Range hygiene
    Ranges should be dynamic (automatically expand/contract as data changes) using Tables, OFFSET, INDEX, or structured references. Do not reference entire columns like A:A when an exact or dynamic range is appropriate. Prevents formulas from breaking when rows/columns are inserted and ensures all data is captured in calculations, especially for financial models that can reasonably be expected to expand to a longer time horizon given the case context. Financial statements and corporate financial calculations should be excluded from failing this criterion.
      Good: All data ranges use Excel Tables or dynamic formulas (OFFSET, INDEX/MATCH). Charts, pivot tables, and summary formulas automatically include new data. No manual range updates needed when the model expands. No entire column references. If there are reasonable explanations based on the case context to not support an expandable range, it is also acceptable.
      Bad:  Hardcoded static ranges throughout. Adding rows breaks formulas or excludes data from calculations. Charts and summaries miss new entries. Requires constant manual range adjustments. Frequent entire-column references.

    --------------------------------------------------------------------------------

    Using absolute references
    When referencing constant/input cells in a formula, especially when a relative reference would corrupt logic if one drags and autofills the formula, check whether the referenced cells are locked with absolute references ($) so they don't shift when formulas are copied.
      Good: References to assumption tables where the formula is subject to autofill, lookup ranges, and constants properly use absolute references. Formulas can be copied anywhere without breaking logic. The model recalculates correctly when assumptions change.
      Bad:  Frequent use of relative references where absolutes are needed. Copying formulas would break calculations. Assumption changes don't flow through properly. #REF! errors or silent calculation errors present.


    ================================================================================
    FORMATTING
    ================================================================================

    Workbook & Sheet Structure
    Check for sensible sheet flow (Inputs/Assumptions -> Workings -> Outputs); precise sectioning with descriptive tab names and a clear separation between outputs and inputs, and consistent structure.
      Good: Sensible sheet flow from Inputs/Assumptions to Workings to Outputs; precise sectioning - clear separation of Inputs, Calculations, and Outputs; consistent tab naming conventions (e.g., "Assumptions", "Model", "Summary").
      Bad:  Poor sheet flow / inconsistent ordering; unclear sectioning - no clear separation between inputs, calculations, and outputs; tabs unnamed or left as default.

    --------------------------------------------------------------------------------

    Readability
    Sheet layout should facilitate easy navigation and comprehension. Freeze panes keep headers visible while scrolling for tables with more than 26 columns or more than 60 rows. There should be consistent spacing, clear labels with correct units, and legends that make data immediately interpretable.
      Good: Freeze panes are applied appropriately so that parts of the model are easy to read. Consistent row/column spacing throughout. Precise titles and subtitles. All values labeled with correct units. Legends provided where needed.
      Bad:  No freeze panes where needed (tables with more than 26 columns or more than 60 rows). Inconsistent or cramped spacing. Missing labels, units, or legends. Difficult to navigate or interpret data without significant effort.

    --------------------------------------------------------------------------------

    Use of Color Standards
    Consistent color coding distinguishes inputs, formulas, and linked cells at a glance. Industry-standard schemes (example font colors: blue=inputs, black=formulas, green=links, orange=checks. Note, these are font color, not color fill) improve navigation and reduce errors by making cell types immediately recognizable.
      Good: Consistent font color key applied throughout the entire model. Industry-standard scheme followed (example: blue=inputs, black=formulas, green=links, orange=checks). Cell purpose should be immediately clear from color alone.
      Bad:  Inconsistent or no color key. Input cells left unformatted or randomly colored. Makes it unclear which cells are inputs versus formulas. No standard followed, forcing users to click into cells to determine type.

    --------------------------------------------------------------------------------

    Number Notation (finance standards)
    Numbers formatted per finance standards: currency symbols, thousand separators, percentages with decimals, negatives in parentheses, consistent precision, date formats consistent, and right-aligned. Units may appear in adjacent cells.
      Good: Currency with symbols and thousand separators. Percentages with appropriate decimals. Negatives in parentheses. Consistent decimal precision by measure type. Consistent date formats. Numbers right-aligned. Units clearly labeled in adjacent cells when applicable.
      Bad:  Missing currency symbols or thousand separators. Incorrect percentage formatting. Negatives shown with minus signs instead of parentheses. Inconsistent decimal precision within the same measure. Inconsistent date formats. Poor number alignment.

    --------------------------------------------------------------------------------

    Information Alignment
    Columns and rows of the same type of information should be aligned vertically. There should be a logical flow in the alignment of different calculations. Subtitles/categories/calculation names should be aligned with their respective values.
      Good: Columns and rows of the same type aligned vertically; logical flow in alignment of calculations; subtitles/categories/calculation names aligned with respective values.
      Bad:  Poor vertical alignment of similar information; illogical flow in calculation alignment; subtitles/categories/calculation names misaligned with values.

    --------------------------------------------------------------------------------

    Consistency of Styles
    Should use consistent sans serif fonts, sizes, boldness, etc. across all sheets for the respective information type. The judge must compare styles across different sheets, not just within a single sheet.
      Good: The same font family and sizing are used consistently across all sheets for headers, labels, and data cells. If multiple sheets exist, they all follow the same style conventions.
      Bad:  Different sheets use different font families or styles for comparable content. Multiple fonts, font sizes, and inconsistent bold/italics exist.

    --------------------------------------------------------------------------------

    Use of Borders & Shading
    Coloring and shading of subtitles, headers, and titles should be consistent and representative of conventional standards or firm-provided templates. Borders should be in proper places to partition information and should not be excessively used.
      Good: Borders used sparingly to separate sections; shading used only for emphasis, a professional, uncluttered look.
      Bad:  Excessive borders; shading used for all sections; headings not distinct.

    --------------------------------------------------------------------------------

    Presentation of Outputs / Summaries
    Workbook should include clear output/summaries/answers/conclusion/outputs/results tab.
      Good: Outputs and key metrics clearly presented in summary dashboards/tables.
      Bad:  No clear summary for end-users.

    --------------------------------------------------------------------------------

    I will be giving you a task in three steps. Your only allowed method for solving this problem is by building an Excel Model using the currently opened sheet, its provided data if any, and any files I attached. You must not use any external or internal tools, like a code interpreter or calculator, to find the final answers. The Excel file you build must be the only thing performing the calculations.

    Your first step is to analyze the attached problem statement and data file(s) and output them in a new sheet called 'Summary'. Do not build the model yet. Provide a brief summary of 1. The primary questions to answer. 2. The key inputs and assumptions. 3. A high-level plan for solving it.

    Your next step is actually making the model.  Adhere to the professional standards specified in the rubric.  Particularly, this model should be up to the accuracy, robustness, standards and presentation abilities of a white-collar worker in a top professional services firm.

    Your final step is to create the answers sheet(s).  On this sheet, present the final answers to all questions. Every single answer on this sheet must be directly referenceable to the model you created. Hard coded values are to be generally avoided here.

    Please finish all steps without stopping and deliver the final excel workbook.

